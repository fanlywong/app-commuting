<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專屬通勤管家</title>
    
    <meta name="theme-color" content="#090d16">
    <link rel="icon" type="image/png" href="app-icon.png">
    <link rel="apple-touch-icon" href="app-icon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #090d16; --card-bg: #111827; --text-main: #f8fafc; --text-sub: #64748b;
            --ktl-green: #00A84D; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --clock-gold: #fbbf24;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; margin: 0; padding: 14px; box-sizing: border-box; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin: 2px 0 14px 0; }
        h1 { font-size: 1.15rem; margin: 0; letter-spacing: 0.5px; color: #f1f5f9; font-weight: 700; }
        
        .btn-config { background: #1e293b; color: #38bdf8; border: 1px solid rgba(56,189,248,0.25); padding: 6px 12px; border-radius: 16px; font-size: 0.75rem; font-weight: 600; cursor: pointer;}

        .card { background: var(--card-bg); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); border-top: 3.5px solid var(--ktl-green); transition: border-color 0.3s;}
        
        #config-panel { display: none; border-top: 3.5px solid #38bdf8; }
        .cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .cfg-full { grid-column: span 2; }
        .cfg-group { display: flex; flex-direction: column; gap: 5px; }
        
        .cfg-group label { font-size: 0.72rem; color: #94a3b8; font-weight: 600; display: flex; justify-content: space-between; align-items: center;}
        .req-star { color: var(--danger); font-size: 0.68rem; font-weight: 700;}
        
        .input-box { display: flex; background: #090d16; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; height: 38px; align-items: center; box-sizing: border-box;}
        .input-box:focus-within { border-color: #38bdf8; }
        .input-box.input-error { border-color: var(--danger) !important; background: rgba(239,68,68,0.08); }

        .input-box input, .input-box select { background: transparent; border: none; color: white; padding: 0 10px; font-size: 0.85rem; width: 100%; height: 100%; outline: none; }
        
        .line-pill-container { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 8px 0; -webkit-overflow-scrolling: touch; margin-top: 2px;}
        .line-pill-container::-webkit-scrollbar { display: none; }
        .line-pill { padding: 5px 10px; border-radius: 14px; font-size: 0.7rem; font-weight: 700; color: white; cursor: pointer; opacity: 0.4; transition: all 0.2s; white-space: nowrap; border: 1px solid transparent;}
        .line-pill.active { opacity: 1; transform: scale(1.04); box-shadow: 0 2px 8px var(--pill-color); border-color: rgba(255,255,255,0.2);}

        option { color: #f8fafc; background: #1e293b; padding: 6px 0;}

        .btn-mini { height: 26px; padding: 0 8px; font-size: 0.68rem; border-radius: 5px; margin-right: 5px; background: #1e293b; color: #38bdf8; border: 1px solid #334155; font-weight: 600; flex-shrink: 0; cursor: pointer;}
        .btn-mini.gps { color: #10b981; border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.1); }
        .btn-mini.search-trigger { color: #38bdf8; border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.1); }

        .cfg-actions { display: grid; grid-template-columns: 1fr 1.4fr; gap: 8px; margin-top: 16px; }
        .btn-cancel { height: 38px; background: transparent; border: 1px solid #334155; color: #64748b; border-radius: 8px; font-size: 0.82rem; font-weight: 600;}
        .btn-save-confirm { height: 38px; background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.3); color: #38bdf8; border-radius: 8px; font-size: 0.82rem; font-weight: 600;}
        
        .btn-ai-glow {
            grid-column: span 2; height: 42px; background: #2563eb; color: white; border: none;
            border-radius: 8px; font-size: 0.88rem; font-weight: 700; letter-spacing: 0.5px;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn-ai-glow:active { transform: scale(0.99); background: #1d4ed8; }

        .timeline { display: flex; justify-content: space-between; align-items: flex-start; background: #090d16; padding: 14px 2px; border-radius: 12px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.03); overflow-x: auto;}
        .step { text-align: center; flex: 1; min-width: 65px; font-size: 0.72rem; color: var(--text-sub); }
        .step span { display: block; font-size: 1.1rem; margin-bottom: 2px; }
        .step .loc-name { display: block; font-size: 0.65rem; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; color: #cbd5e1; margin-top: 2px; padding: 0 2px;}
        .step b { display: block; font-size: 0.82rem; color: #38bdf8; margin-top: 2px; font-weight: 700;}
        .step b.dest-time { color: var(--clock-gold); font-size: 0.92rem; }
        
        .sub-transfer { display: block; font-size: 0.55rem; color: #f43f5e; font-style: normal; margin-top: 1px; white-space: nowrap; letter-spacing: -0.3px;}

        .arrow-box { display: flex; flex-direction: column; align-items: center; width: 26px; flex-shrink: 0; margin-top: 4px;}
        .arrow-time { font-size: 0.54rem; color: #64748b; background: #111827; padding: 1px 2px; border-radius: 3px; font-weight: bold; white-space: nowrap;}
        
        .section-title { font-size: 0.98rem; font-weight: 700; color: #e2e8f0; display: flex; justify-content: space-between; align-items: center;}
        .route-sub-title { font-size: 0.82rem; color: #38bdf8; margin: 12px 0 5px 0; font-weight: 700; display: flex; align-items: center; gap: 5px;}

        .sprint-capsule { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #fbbf24; padding: 7px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; display: flex; justify-content: space-between; margin: 8px 0 4px 0; cursor: pointer;}
        .sprint-drawer { display: none; flex-direction: column; gap: 6px; margin-bottom: 8px; padding: 2px; border-left: 1.5px dashed #ef444440; }
        .sprint-drawer.open { display: flex; animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

        .sprint-card-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #1e293b50; border: 1px solid #ef444430; border-radius: 10px; }

        .train { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; padding: 10px 12px; background: #090d1680; border-radius: 10px; border: 1px solid #33415540;}
        .train.next-train { background: rgba(16, 185, 129, 0.06); border-left: 3.5px solid var(--success); }
        .train-time { font-size: 1.5rem; font-weight: 800; color: var(--success); }
        .train-time.urgent { color: var(--warning); }
        .train-time.too-late { color: var(--danger); }
        .train-label { font-size: 0.84rem; color: var(--text-sub); font-weight: 500;}

        .clock-dashboard { display: flex; background: #090d16; border: 1px solid #334155; border-radius: 14px; padding: 14px; margin-top: 14px; align-items: center; }
        .clock-box { flex: 1; text-align: center; }
        .clock-label { font-size: 0.74rem; color: var(--text-sub); margin-bottom: 3px; display: block;}
        .clock-val { font-size: 1.25rem; font-weight: 800; color: var(--text-main); }
        .clock-val.target { color: var(--clock-gold); font-size: 1.38rem; }
        .divider { width: 1px; height: 32px; background: #334155; }

        .emotion-box { padding: 12px; border-radius: 12px; text-align: center; font-size: 0.88rem; font-weight: bold; margin-top: 14px; line-height: 1.4; }
        .mood-chill { background: #10b98115; color: #34d399; } .mood-run { background: #f59e0b15; color: #fbbf24; } .mood-giveup { background: #ef444415; color: #f87171; }
        #update-time { text-align: center; font-size: 0.7rem; color: #475569; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 id="main-title">🏢 載入中...</h1>
        <button class="btn-config" onclick="toggleConfig()">⚙️ 修改路線</button>
    </div>

    <div id="config-panel" class="card">
        <div class="section-title" style="color:#38bdf8">🤖 AI 智能尋路設定</div>
        <div class="cfg-grid">
            
            <div class="cfg-group">
                <label>起點 <span class="req-star">*必填</span></label>
                <div class="input-box" id="wrap-start-name"><input type="text" id="cfg-start-name" placeholder="例：APM"></div>
            </div>
            <div class="cfg-group"><label>步行往站 (分)</label>
                <div class="input-box"><input type="number" id="cfg-walk1" min="1"><button type="button" class="btn-mini" onclick="smartWalk('start')">測距</button></div>
            </div>
            
            <div class="cfg-group">
                <label>終點 <span class="req-star">*必填</span></label>
                <div class="input-box" id="wrap-dest-name"><input type="text" id="cfg-dest-name" placeholder="例：K11"></div>
            </div>
            <div class="cfg-group"><label>出站步行 (分)</label>
                <div class="input-box"><input type="number" id="cfg-walk2" min="1"><button type="button" class="btn-mini" onclick="smartWalk('dest')">測距</button></div>
            </div>

            <div class="cfg-group cfg-full">
                <label>篩選上車站綫路</label>
                <div class="line-pill-container" id="start-line-pills"></div>
            </div>
            <div class="cfg-group cfg-full"><label>上車車站 (可手動修改/AI自動覆蓋)</label>
                <div class="input-box"><select id="cfg-start-sta"></select><button type="button" class="btn-mini search-trigger" onclick="autoLocateStationFromInput('start')">🔍 尋起點站</button></div>
            </div>

            <div class="cfg-group cfg-full">
                <label>篩選落車站綫路</label>
                <div class="line-pill-container" id="end-line-pills"></div>
            </div>
            <div class="cfg-group cfg-full"><label>落車車站 (可手動修改/AI自動覆蓋)</label>
                <div class="input-box"><select id="cfg-end-sta"></select><button type="button" class="btn-mini search-trigger" onclick="autoLocateStationFromInput('dest')">🔍 尋終點站</button></div>
            </div>

        </div>
        
        <div class="cfg-actions">
            <button class="btn-cancel" onclick="toggleConfig()">取消</button>
            <button class="btn-save-confirm" onclick="runManualSave()">💾 儲存修改</button>
            <button id="btn-save-main" class="btn-ai-glow" onclick="runAutoPathfinder()">🤖 AI 智能規劃</button>
        </div>
    </div>

    <div class="card" id="main-card">
        <div class="section-title"><span>📍 行程路標</span><span id="label-walk-speed" style="font-size:0.78rem; color:#64748b">--分步速</span></div>
        <div class="timeline" id="dynamic-timeline-box">
            <div style="text-align:center; width:100%; color:#64748b; font-size:0.8rem;">軌道地圖生成中...</div>
        </div>
    </div>

    <div class="card">
        <div class="section-title"><span id="ui-dir-label">列車動態 ⬇️</span><span style="color:var(--success); font-size:0.75rem">● 實時連線</span></div>
        <div id="train-list"><div style="text-align:center; padding: 15px; color: #64748b;">解碼中...</div></div>
        <div class="clock-dashboard">
            <div class="clock-box"><span class="clock-label">⏳ 預計總耗時</span><span class="clock-val" id="total-duration">-- 分</span></div>
            <div class="divider"></div>
            <div class="clock-box"><span class="clock-label">🏁 抵達終點</span><span class="clock-val target" id="arrive-clock">--點--分</span></div>
        </div>
        <div id="emotion-message" class="emotion-box mood-chill" style="display:none;"></div>
    </div>

    <div id="update-time">通電中...</div>

        const PREF_HUBS = ['MOK','ADM','CEN','TST','KOT','HUH','TAW','DIH','PRE','YMT','NOP','QUB','YAT','TIK','MEF','NAC','LAK','HOM','TSY','HOK'];

        const STA_INDEX = {};
        for (let l in MTR_DB) {
            MTR_DB[l].order.forEach(c => {
                if (!STA_INDEX[c]) STA_INDEX[c] = { name: MTR_DB[l].names[c], lines: [] };
                if (!STA_INDEX[c].lines.includes(l)) STA_INDEX[c].lines.push(l);
            });
        }

        const fmtT = d => `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        const fmtC = d => { let h = d.getHours(), m = d.getMinutes().toString().padStart(2, '0'); return `${h < 6 ? "凌晨" : h < 12 ? "上午" : h < 18 ? "下午" : "晚上"} ${h % 12 || 12}點${m}分`; };

        function getClosestMTRCode(lat, lon) {
            let minD = 9999, best = 'MOK';
            for (let c in MTR_GEO) {
                let d = Math.hypot(lat - MTR_GEO[c][0], lon - MTR_GEO[c][1]);
                if (d < minD) { minD = d; best = c; }
            }
            return best;
        }

        function getMazePenalty(code) {
            if (['HKU','SYP','QUB','HOM','LAT','YAT','DIH','EXC','ADM','CEN','TST','HOK'].includes(code)) return 4.5;
            if (['KWT','NTK','KOB','CHH','SHS','FAN','TAP','UNI','FOT','SHT','TAW','LHP','AIR'].includes(code)) return 1.0;
            return 3.0;
        }

        async function geocodeAddress(kw) {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(kw+",香港")}&format=json&limit=1`);
                const d = await r.json();
                if(d.length > 0) return { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon) };
            } catch(e) {}
            return null;
        }

        let activeStartLine = 'KTL';
        let activeEndLine = 'TWL';

        function renderStationSelect(type, targetLine) {

                endHtml += `<div class="line-pill ${lineKey===activeEndLine?'active':''}" id="pill-end-${lineKey}" style="background:${MTR_DB[lineKey].color}; --pill-color:${MTR_DB[lineKey].color}" onclick="selectLinePill('end', '${lineKey}')">${MTR_DB[lineKey].name}</div>`;
            }
            startBox.innerHTML = startHtml; endBox.innerHTML = endHtml;

            renderStationSelect('end', activeEndLine);

        function selectLinePill(type, lineKey) {

        async function autoLocateStationFromInput(type) {
            const inputId = type === 'start' ? 'cfg-start-name' : 'cfg-dest-name';
            const queryName = document.getElementById(inputId).value.trim();
            if (!queryName) return alert("🚨 請先輸入地名門牌，先可以幫你精準定位車站！");

            let targetCode = 'MOK';
            const coord = await geocodeAddress(queryName);
            if (coord) { targetCode = getClosestMTRCode(coord.lat, coord.lon); }
            else { return alert("⚠️ 找不到該地名坐標，請輸入更精確的香港街道或屋苑名稱！"); }

            let belongLine = STA_INDEX[targetCode].lines[0];
            selectLinePill(type, belongLine);
            document.getElementById(type === 'start' ? 'cfg-start-sta' : 'cfg-end-sta').value = targetCode;
            alert(`🎯 智能感應成功！已為你鎖定最近車站：【${STA_INDEX[targetCode].name}站】`);
        }

        async function runAutoPathfinder() {
            if (!validateForm()) return;
            const btn = document.getElementById('btn-save-main');
            const origText = btn.innerText; btn.innerText = "🧠 AI 運算中..."; btn.disabled = true;

            let sName = document.getElementById('cfg-start-name').value.trim();
            let dName = document.getElementById('cfg-dest-name').value.trim();
            let sCode = document.getElementById('cfg-start-sta').value;
            let eCode = document.getElementById('cfg-end-sta').value;
            let w1 = parseInt(document.getElementById('cfg-walk1').value) || 4;
            let w2 = parseInt(document.getElementById('cfg-walk2').value) || 3;

            try {
                const c1 = await geocodeAddress(sName);
                if (c1) {
                    sCode = getClosestMTRCode(c1.lat, c1.lon);
                    let r = await fetch(`https://router.project-osrm.org/route/v1/foot/${c1.lon},${c1.lat};${MTR_GEO[sCode][1]},${MTR_GEO[sCode][0]}`);
                    let rd = await r.json();
                    w1 = Math.max(1, Math.round((rd.routes[0].duration / 60) + getMazePenalty(sCode)));
                }
                const c2 = await geocodeAddress(dName);
                if (c2) {
                    eCode = getClosestMTRCode(c2.lat, c2.lon);
                    let r2 = await fetch(`https://router.project-osrm.org/route/v1/foot/${c2.lon},${c2.lat};${MTR_GEO[eCode][1]},${MTR_GEO[eCode][0]}`);
                    let rd2 = await r2.json();
                    w2 = Math.max(1, Math.round((rd2.routes[0].duration / 60) + getMazePenalty(eCode)));
                }

                curCfg = { startName: sName, walk1: w1, sCode: sCode, eCode: eCode, walk2: w2, destName: dName };
                localStorage.setItem('my_commute_v14_dynamic_interchange', JSON.stringify(curCfg));
                syncFormValues(); document.getElementById('config-panel').style.display = 'none';
                applyUI(); fetchMTR();
            } catch(e) { alert("運算小偏差：" + e.message); }
            btn.innerText = origText; btn.disabled = false;
        }

        function runManualSave() {
            if (!validateForm()) return;
            let sName = document.getElementById('cfg-start-name').value.trim();
            let dName = document.getElementById('cfg-dest-name').value.trim();
            let sCode = document.getElementById('cfg-start-sta').value;
            let eCode = document.getElementById('cfg-end-sta').value;
            let w1 = parseInt(document.getElementById('cfg-walk1').value) || 4;
            let w2 = parseInt(document.getElementById('cfg-walk2').value) || 3;

            curCfg = { startName: sName, walk1: w1, sCode: sCode, eCode: eCode, walk2: w2, destName: dName };
            localStorage.setItem('my_commute_v14_dynamic_interchange', JSON.stringify(curCfg));
            document.getElementById('config-panel').style.display = 'none';
            applyUI(); fetchMTR();
        }

        async function smartWalk(type) {
            const sCode = type === 'start' ? document.getElementById('cfg-start-sta').value : document.getElementById('cfg-end-sta').value;
            const pName = type === 'start' ? document.getElementById('cfg-start-name').value : document.getElementById('cfg-dest-name').value;
            const targetId = type === 'start' ? 'cfg-walk1' : 'cfg-walk2';
            if (!pName) return alert('請先輸入起點或終點！');
            const c = await geocodeAddress(pName);
            if(c) {
                let r = await fetch(`https://router.project-osrm.org/route/v1/foot/${c.lon},${c.lat};${MTR_GEO[sCode][1]},${MTR_GEO[sCode][0]}`);
                let rd = await r.json();
                document.getElementById(targetId).value = Math.max(1, Math.round((rd.routes[0].duration/60) + getMazePenalty(sCode)));
            }
        }

        // 🧠 【核心優化】：使用 BFS 廣度優先算法，支持無限級轉乘（如康城去機場）
        function calculateAutoRoute(sCode, eCode) {
            if (sCode === eCode) {
                return { segments: [{ line: STA_INDEX[sCode].lines[0], from: sCode, to: sCode, rideTime: 0 }], totalRide: 0 };
            }

            // 特殊虛擬轉乘：中環 (CEN) <-> 香港 (HOK)
            const checkVirtualTransfer = (currCode, nextLine) => {
                if (currCode === 'CEN' && MTR_DB[nextLine].order.includes('HOK')) return { code: 'HOK', penalty: 3 };
                if (currCode === 'HOK' && MTR_DB[nextLine].order.includes('CEN')) return { code: 'CEN', penalty: 3 };
                return null;
            };

            let queue = [ { currentStation: sCode, path: [], totalTime: 0 } ];
            let visitedStations = new Set([sCode]);

            while (queue.length > 0) {
                let curr = queue.shift();
                let currLines = STA_INDEX[curr.currentStation].lines;

                for (let line of currLines) {
                    let order = MTR_DB[line].order;
                    let targetLines = STA_INDEX[eCode].lines;

                    // 1. 如果同線直達
                    if (targetLines.includes(line)) {
                        let t1 = MTR_DB[line].times[curr.currentStation];
                        let t2 = MTR_DB[line].times[eCode];
                        let ride = Math.abs(t1 - t2);
                        let finalPath = [...curr.path, { line: line, from: curr.currentStation, to: eCode, rideTime: ride }];
                        return { segments: finalPath, totalRide: curr.totalTime + ride };
                    }

                    // 2. 搜尋潛在轉乘站
                    for (let possibleHub of order) {
                        if (possibleHub === curr.currentStation) continue;
                        
                        let nextLines = STA_INDEX[possibleHub].lines;
                        for (let nLine of nextLines) {
                            if (nLine === line) continue;

                            if (!visitedStations.has(possibleHub)) {
                                visitedStations.add(possibleHub);
                                let t1 = MTR_DB[line].times[curr.currentStation];
                                let tHub = MTR_DB[line].times[possibleHub];
                                let ride = Math.abs(t1 - tHub);
                                
                                queue.push({
                                    currentStation: possibleHub,
                                    path: [...curr.path, { line: line, from: curr.currentStation, to: possibleHub, rideTime: ride }],
                                    totalTime: curr.totalTime + ride + 3 // 3分鐘轉乘懲罰
                                });
                            }
                        }
                    }
                }

                // 3. 處理中環/香港的站外步行轉乘特例
                let vTrans = null;
                if (curr.currentStation === 'CEN') vTrans = { code: 'HOK', penalty: 4 };
                if (curr.currentStation === 'HOK') vTrans = { code: 'CEN', penalty: 4 };
                if (vTrans && !visitedStations.has(vTrans.code)) {
                    visitedStations.add(vTrans.code);
                    queue.push({
                        currentStation: vTrans.code,
                        path: [...curr.path, { line: 'WALK', from: curr.currentStation, to: vTrans.code, rideTime: vTrans.penalty, isVirtual: true }],
                        totalTime: curr.totalTime + vTrans.penalty
                    });
                }
            }

            return { segments: [{ line: STA_INDEX[sCode].lines[0], from: sCode, to: sCode, rideTime: 15 }], totalRide: 15 };
        }

        const DEF_CFG = { startName: 'APM', walk1: 4, sCode: 'KWT', eCode: 'TST', walk2: 3, destName: 'K11' };
        let curCfg = JSON.parse(localStorage.getItem('my_commute_v14_dynamic_interchange')) || DEF_CFG;
        let activeRoute = null; let isSprintOpen = false;

        function toggleSprintDrawer() {
            isSprintOpen = !isSprintOpen;
            const drawer = document.getElementById('sprint-drawer-box');
            if (drawer) drawer.classList.toggle('open', isSprintOpen);
            const icon = document.getElementById('sprint-arrow-icon');
            if (icon) icon.innerText = isSprintOpen ? '▲' : '▼';
        }

        function initApp() {
            setupLinePills(); syncFormValues(); applyUI(); fetchMTR(); setInterval(fetchMTR, 10000);
        }

        function applyUI() {
            activeRoute = calculateAutoRoute(curCfg.sCode, curCfg.eCode);
            document.getElementById('main-title').innerText = `🏢 ${curCfg.startName} ➔ ${curCfg.destName}`;
            document.getElementById('label-walk-speed').innerText = `${curCfg.walk1}分鐘步速`;
            const firstLine = activeRoute.segments[0].line;
            document.getElementById('main-card').style.borderTop = `3.5px solid ${MTR_DB[firstLine] ? MTR_DB[firstLine].color : '#38bdf8'}`;
        }

        async function fetchMTR() {
            if (!activeRoute || !activeRoute.segments.length) return;
            const currentW = parseInt(document.getElementById('cfg-walk1').value) || curCfg.walk1;
            
            // 多綫實時連線：動態請求路綫陣列中所有真實鐵路綫的實時動態
            try {
                let reqs = [];
                let checkedKeys = new Set();
                
                activeRoute.segments.forEach(seg => {
                    if (seg.line !== 'WALK') {
                        let key = `${seg.line}-${seg.from}`;
                        if (!checkedKeys.has(key)) {
                            checkedKeys.add(key);
                            let dir = MTR_DB[seg.line].order.indexOf(seg.from) < MTR_DB[seg.line].order.indexOf(seg.to) ? 'UP' : 'DOWN';
                            let url = `https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${seg.line}&sta=${seg.from}`;
                            reqs.push({ line: seg.line, sta: seg.from, dir: dir, fetchPromise: fetch(url).then(r => r.json()).catch(()=>null) });
                        }
                    }
                });

                const results = await Promise.all(reqs.map(r => r.fetchPromise));
                let liveDataMap = {};
                reqs.forEach((req, index) => {
                    if (results[index] && results[index].data) {
                        let resKey = `${req.line}-${req.sta}`;
                        liveDataMap[resKey] = results[index].data[resKey] ? results[index].data[resKey][req.dir] || [] : [];
                    }
                });

                renderDashboard(liveDataMap, currentW);
            } catch (err) {}
        }

        function renderDashboard(liveDataMap, dynamicW) {
            const listHtml = document.getElementById('train-list'), eBox = document.getElementById('emotion-message'), now = new Date();
            const W = dynamicW;
            
            let firstSeg = activeRoute.segments[0];
            let firstKey = `${firstSeg.line}-${firstSeg.from}`;
            let firstTrainData = liveDataMap[firstKey] || [];

            const sprintTrains = firstTrainData.filter(t => parseInt(t.ttnt) < W && !isNaN(parseInt(t.ttnt))), walkTrains = firstTrainData.filter(t => parseInt(t.ttnt) >= W);
            let showWalk = walkTrains.slice(0, 2); let isMid = !walkTrains.length && !sprintTrains.length && !firstTrainData.length;

            let html = '';

            // 1. 生成第一程或直達車
            let firstLineTitle = activeRoute.segments.length === 1 ? `直達路綫：${MTR_DB[firstSeg.line].name}` : `第一程：${MTR_DB[firstSeg.line].name}`;
            html += `<div class="route-sub-title" style="color:${MTR_DB[firstSeg.line].color}">🚇 ${firstLineTitle} (${STA_INDEX[firstSeg.from].name}站出發)</div>`;

            if (sprintTrains.length > 0) {
                html += `<div class="sprint-capsule" onclick="toggleSprintDrawer()"><span>💡 已收起 ${sprintTrains.length} 班狂奔列車</span><b id="sprint-arrow-icon">${isSprintOpen ? '▲' : '▼'}</b></div><div id="sprint-drawer-box" class="sprint-drawer ${isSprintOpen ? 'open' : ''}">`;
                sprintTrains.forEach(t => {
                    let sm = parseInt(t.ttnt), hypDest = new Date(now.getTime() + (sm + activeRoute.totalRide + curCfg.walk2) * 60000);
                    html += `<div class="sprint-card-item"><div><span style="color:#f87171; font-size:0.85rem; font-weight:700;">🏃‍♂️ 極速狂奔（${sm}分到站）</span><div style="font-size:0.72rem; color:#94a3b8;">衝到 ➔ <b style="color:#fbbf24">${fmtC(hypDest)}</b> 抵達</div></div><span style="font-size:1.4rem; font-weight:800; color:#ef4444;">${sm}分</span></div>`;
                });
                html += `</div>`;
            }

            if (showWalk.length === 0 && !isMid && firstSeg.line !== 'WALK') {
                html += `<div class="train" style="border: 1px dashed rgba(245, 158, 11, 0.4); background: rgba(245, 158, 11, 0.03);">
                            <span class="train-label" style="color:var(--warning); font-size:0.82rem; font-weight:600;">🐢 正常步速已無趕得切嘅車次</span>
                            <span class="train-time urgent" style="font-size:0.88rem; font-weight:700; color:#fbbf24;">請點開上方狂奔區 🏃‍♂️</span>
                         </div>`;
            }

            showWalk.forEach((t, i) => {
                let m = parseInt(t.ttnt);
                html += `<div class="${i===0 ?'train next-train':'train'}"><span class="train-label">${i===0?'🚶‍♂️ 正常步速（首選）':'🛡️ 次班備用'}</span><span class="train-time ${(m===W||m===W+1)?'urgent':''}">${isNaN(m)?"抵達中":m+" 分鐘"}</span></div>`;
            });

            // 2. 循環生成後續所有轉乘點（支援無限級轉乘）
            for(let k = 1; k < activeRoute.segments.length; k++) {
                let seg = activeRoute.segments[k];
                if(seg.line === 'WALK') {
                    html += `<div class="route-sub-title" style="color:#64748b">🚶‍♂️ 站外轉乘：經行人隧道步行往 ${STA_INDEX[seg.to].name}</div>`;
                } else {
                    html += `<div class="route-sub-title" style="color:${MTR_DB[seg.line].color}">🔄 接駁：${MTR_DB[seg.line].name} (${STA_INDEX[seg.from].name}站轉乘)</div>`;
                    let nextTrainData = liveDataMap[`${seg.line}-${seg.from}`] || [];
                    if(nextTrainData.length) {
                        nextTrainData.slice(0,2).forEach((t, i) => { 
                            html += `<div class="train"><span class="train-label">${i===0?'⚡ 預計接駁':'🛡️ 次班接駁'}</span><span class="train-time" style="color:#38bdf8">${isNaN(parseInt(t.ttnt))?"抵達中":t.ttnt+" 分鐘"}</span></div>`; 
                        });
                    } else {
                        html += `<div class="train"><span class="train-label">⏳ 班次班距</span><span class="train-time" style="color:#64748b">約 4-7 分鐘</span></div>`;
                    }
                }
            }
            listHtml.innerHTML = html;

            // 3. 計算動態時間軸線
            let tMins = 0; let finalTargetTrain = null;
            if (showWalk.length > 0) { finalTargetTrain = showWalk[0]; tMins = parseInt(finalTargetTrain.ttnt) || 0; } 
            else {
                let absoluteNext = firstTrainData.find(t => !isNaN(parseInt(t.ttnt)) && parseInt(t.ttnt) >= W);
                if (absoluteNext) { finalTargetTrain = absoluteNext; tMins = parseInt(absoluteNext.ttnt); } 
                else { let backup = firstTrainData.find(t => !isNaN(parseInt(t.ttnt)) && parseInt(t.ttnt) >= 0); tMins = backup ? Math.max(W, parseInt(backup.ttnt)) : W; }
            }

            let tTimelineTracker = new Date(now.getTime() + tMins * 60000);
            let tlContainer = document.getElementById('dynamic-timeline-box');
            
            let tlHtml = `<div class="step"><span>🚶‍♂️</span><div class="loc-name">${curCfg.startName}</div><b>${fmtT(now)}</b></div>`;
            tlHtml += `<div class="arrow-box"><span class="arrow-time">+${curCfg.walk1}分</span>➔</div>`;
            
            activeRoute.segments.forEach((seg, idx) => {
                if (idx === 0) {
                    tlHtml += `<div class="step"><span>🚇</span><div class="loc-name">${STA_INDEX[seg.from].name}站</div><b>${fmtT(tTimelineTracker)}</b></div>`;
                }
                
                tTimelineTracker = new Date(tTimelineTracker.getTime() + seg.rideTime * 60000);
                
                if (idx < activeRoute.segments.length - 1) {
                    let nextSeg = activeRoute.segments[idx+1];
                    let label = nextSeg.line === 'WALK' ? '站外轉' : `轉${MTR_DB[nextSeg.line].name.replace('綫','')}`;
                    tlHtml += `<div class="arrow-box"><span class="arrow-time">+${seg.rideTime}分</span>➔</div>`;
                    tlHtml += `<div class="step"><span>🔄</span><div class="loc-name" style="color:#38bdf8">${STA_INDEX[seg.to].name}站</div><b style="color:#38bdf8">${fmtT(tTimelineTracker)}</b><em class="sub-transfer">${label}</em></div>`;
                    tTimelineTracker = new Date(tTimelineTracker.getTime() + 3 * 60000); // 緩衝加3分
                    tlHtml += `<div class="arrow-box"><span class="arrow-time">+3分</span>➔</div>`;
                } else {
                    tlHtml += `<div class="arrow-box"><span class="arrow-time">+${seg.rideTime}分</span>➔</div>`;
                    tlHtml += `<div class="step"><span>🚇</span><div class="loc-name">${STA_INDEX[seg.to].name}站</div><b>${fmtT(tTimelineTracker)}</b></div>`;
                }
            });

            let tDest = new Date(tTimelineTracker.getTime() + curCfg.walk2 * 60000);
            tlHtml += `<div class="arrow-box"><span class="arrow-time">+${curCfg.walk2}分</span>➔</div>`;
            tlHtml += `<div class="step"><span>🏁</span><div class="loc-name">${curCfg.destName}</div><b class="dest-time">${fmtT(tDest)}</b></div>`;
            
            tlContainer.innerHTML = tlHtml;
            document.getElementById('total-duration').innerText = `共 ${Math.round((tDest - now)/60000)} 分鐘`; 
            document.getElementById('arrive-clock').innerText = fmtC(tDest);

            // 4. 控制情緒看版
            eBox.style.display = 'block';
            let nowTimeFmt = fmtT(now);
            document.getElementById('update-time').innerText = `最後同步: ${nowTimeFmt}`;

            if (isMid) {
                eBox.className = 'emotion-box mood-giveup';
                eBox.innerHTML = `🚨 鐵路網絡已接近尾班車，完全無車可搭！請立刻截的士！`;
            } else if (showWalk.length === 0) {
                if (sprintTrains.length > 0) {
                    let latestSprintMins = parseInt(sprintTrains[sprintTrains.length - 1].ttnt);
                    let runLimit = W - 2;
                    if (latestSprintMins < runLimit) {
                        let waitMins = finalTargetTrain ? (parseInt(finalTargetTrain.ttnt) - W) : 3;
                        eBox.className = 'emotion-box mood-chill';
                        eBox.innerHTML = `🐢 慢慢嚟啦！最遲嗰班狂奔車都得返 ${latestSprintMins} 分鐘，行要 ${W} 分鐘，點跑都衝唔到啦！正常行過去啦，預計到月台等多 ${waitMins} 分鐘坐下一班穩陣車。`;
                    } else {
                        eBox.className = 'emotion-box mood-run';
                        eBox.innerHTML = `⚡ <b>搏盡模式！</b> 狂奔區最遲班次喺 ${latestSprintMins} 分鐘後。正常行（${W}分）會送車尾，但如果你<b>依家即刻跑</b>減 2 分鐘，有望衝到！唔跑就要等多班。`;
                    }
                } else {
                    let waitMins = finalTargetTrain ? (parseInt(finalTargetTrain.ttnt) - W) : 3;
                    eBox.className = 'emotion-box mood-chill';
                    eBox.innerHTML = `⏳ 正常步速啱啱送車尾。行過去月台後，預計只需等多 ${waitMins} 分鐘就有下一班穩陣車，慢慢行即可。`;
                }
            } else {
                if (tMins === W || tMins === W + 1) { eBox.className = 'emotion-box mood-run'; eBox.innerHTML = `🔥 <b>黃金出門一刻！</b> 正常首選班次將於 ${tMins} 分鐘後到站，你行過去需時 ${W} 分鐘，依家出發啱啱好！`; } 
                else { eBox.className = 'emotion-box mood-chill'; eBox.innerHTML = `😎 時間非常充裕！首選班次喺 ${tMins} 分鐘後先到，行過去只需 ${W} 分鐘，慢慢嘆多杯水先起行。`; }
            }
        }

        initApp();
    </script>
</body>
</html>
