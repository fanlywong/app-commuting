<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能通勤規劃與動態導航</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-blue: #0ea5e9;
            --primary-green: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-warn: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: #0b0f19;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input, select {
            flex: 1;
            background-color: #0f172a;
            border: 1px solid #334155;
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
        }

        input[type="number"] {
            max-width: 100px;
        }

        button {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0284c7;
        }

        .btn-plan {
            background-color: var(--primary-green);
        }
        .btn-plan:hover {
            background-color: #059669;
        }

        /* 列車動態樣式 */
        .train-status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .live-badge {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--primary-green);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .train-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .train-item {
            background-color: #0f172a;
            padding: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary-blue);
        }

        .train-item.recommended {
            border-left-color: var(--primary-green);
            background-color: rgba(16, 185, 129, 0.05);
        }

        .time-tag {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .countdown-tag {
            color: var(--text-warn);
            font-size: 0.9rem;
        }

        .no-trains {
            color: var(--text-muted);
            text-align: center;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>富強苑 ➔ 形品星寓</h2>

    <div class="card">
        <div style="color: #f472b6; margin-bottom: 15px; font-weight: bold;">🧠 AI 智能尋路設定</div>
        
        <div class="form-group">
            <label>起點門牌名稱</label>
            <input type="text" id="startLocation" value="富強苑">
        </div>

        <div class="form-group">
            <label>步行至港鐵站 (分鐘)</label>
            <div class="input-row">
                <input type="number" id="walkingTime" value="10" min="0" max="60">
                <select id="startStation">
                    <option value="樂富站">樂富站 (觀塘綫)</option>
                    <option value="觀塘站">觀塘站 (觀塘綫)</option>
                </select>
            </div>
        </div>

        <button class="btn-plan" onclick="runAIPlanning()">🤖 AI 智能規劃</button>
    </div>

    <div class="card">
        <div class="train-status-header">
            <div style="font-weight: bold;">🚆 列車動態 (樂富站出發)</div>
            <div class="live-badge">● 實時連線</div>
        </div>
        
        <div id="trainListContainer" class="train-list">
            </div>
    </div>
</div>

<script>
    // 模擬從特區政府/港鐵開放資料 API 獲取的原始數據 (Raw Data)
    // 這裡包含了接下來 4 班列車的實時 GPS 到站預計時間
    function getMockMtrRawData() {
        const now = new Date();
        
        // 為了測試方便，我們動態生成相對於現在時間的班次
        return [
            { platform: 1, destination: "黃埔", eta: biasTime(3) },  // 3 分鐘後到站
            { platform: 1, destination: "黃埔", eta: biasTime(7) },  // 7 分鐘後到站
            { platform: 1, destination: "黃埔", eta: biasTime(11) }, // 11 分鐘後到站
            { platform: 1, destination: "黃埔", eta: biasTime(16) }  // 16 分鐘後到站
        ];
    }

    // 輔助函數：計算當前時間加上 N 分鐘後的 Date 物件
    function biasTime(minutes) {
        const d = new Date();
        d.setMinutes(d.getMinutes() + minutes);
        return d;
    }

    // 輔助函數：將 Date 物件轉換為格式化字串 "HH:MM"
    function fmtT(dateObj) {
        const hours = String(dateObj.getHours()).padStart(2, '0');
        const minutes = String(dateObj.getMinutes()).padStart(2, '0');
        return `${hours}:${minutes}`;
    }

    // 核心優化：核心時空投影過濾算法
    function filterTrainsByWalkingTime(rawTrains, walkingMinutes) {
        const now = new Date();
        
        // 關鍵計算：你出發的時間 + 你行過去要的時間 = 你最快可以踏上月台的時間線
        const earliestPlatformTime = new Date(now.getTime() + walkingMinutes * 60 * 1000);
        
        console.log(`[AI Logic] 當前時間: ${fmtT(now)}`);
        console.log(`[AI Logic] 步行所需: ${walkingMinutes} 分鐘`);
        console.log(`[AI Logic] 預計到達月台時間: ${fmtT(earliestPlatformTime)}`);

        // 使用精準的時間戳 (Timestamp) 進行大小對比，完美避開字串對比的 Bug
        return rawTrains.filter(train => {
            const trainEtaTime = new Date(train.eta).getTime();
            const myPlatformTime = earliestPlatformTime.getTime();
            
            // 只有當「列車到站時間」大於或等於「你到達月台的時間」，你才趕得切上車！
            return trainEtaTime >= myPlatformTime;
        });
    }

    // 執行 AI 規劃與渲染 UI
    function runAIPlanning() {
        const walkingMinutes = parseInt(document.getElementById('walkingTime').value) || 0;
        const container = document.getElementById('trainListContainer');
        
        // 1. 抓取原始實時數據
        const rawData = getMockMtrRawData();
        
        // 2. 進行時空過濾
        const filteredTrains = filterTrainsByWalkingTime(rawData, walkingMinutes);
        
        // 3. 渲染至網頁畫面上
        container.innerHTML = ""; // 先清空舊資料
        
        if (filteredTrains.length === 0) {
            container.innerHTML = `<div class="no-trains">⚠️ 沒有趕得切的班次，請跑少兩步或調整步速。</div>`;
            return;
        }

        filteredTrains.forEach((train, index) => {
            const trainItem = document.createElement('div');
            trainItem.className = `train-item ${index === 0 ? 'recommended' : ''}`;
            
            // 計算倒數分鐘
            const diffMs = new Date(train.eta).getTime() - new Date().getTime();
            const diffMins = Math.max(0, Math.floor(diffMs / 1000 / 60));
            
            trainItem.innerHTML = `
                <div>
                    <span style="font-weight: bold; color: #10b981;">${index === 0 ? '🏆 首選班次' : '後備班次'}</span>
                    <div style="font-size: 0.85rem; color: #94a3b8; margin-top: 4px;">往 ${train.destination}</div>
                </div>
                <div style="text-align: right;">
                    <div class="time-tag">${fmtT(train.eta)}</div>
                    <div class="countdown-tag">${diffMins} 分鐘後到站</div>
                </div>
            `;
            container.appendChild(trainItem);
        });
    }

    // 頁面首次載入時自動運行一次
    window.onload = function() {
        runAIPlanning();
    };
</script>

</body>
</html>
