<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專屬通勤管家</title>
    
    <meta name="theme-color" content="#090d16">
    <link rel="icon" type="image/png" href="app-icon.png">
    <link rel="apple-touch-icon" href="app-icon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --bg-color: #090d16; --card-bg: #111827; --text-main: #f8fafc; --text-sub: #64748b;
            --ktl-green: #00A84D; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --clock-gold: #fbbf24;
        }
        body { background: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; margin: 0; padding: 14px; box-sizing: border-box; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin: 2px 0 14px 0; }
        h1 { font-size: 1.15rem; margin: 0; letter-spacing: 0.5px; color: #f1f5f9; font-weight: 700; }
        
        .btn-config { background: #1e293b; color: #38bdf8; border: 1px solid rgba(56,189,248,0.25); padding: 6px 12px; border-radius: 16px; font-size: 0.75rem; font-weight: 600; cursor: pointer;}

        .card { background: var(--card-bg); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); border-top: 3.5px solid var(--ktl-green); transition: border-color 0.3s;}
        
        #config-panel { display: none; border-top: 3.5px solid #38bdf8; }
        .cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .cfg-full { grid-column: span 2; }
        .cfg-group { display: flex; flex-direction: column; gap: 5px; }
        
        .cfg-group label { font-size: 0.72rem; color: #94a3b8; font-weight: 600; display: flex; justify-content: space-between; align-items: center;}
        .req-star { color: var(--danger); font-size: 0.68rem; font-weight: 700;}
        
        .input-box { display: flex; background: #090d16; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; height: 38px; align-items: center; box-sizing: border-box;}
        .input-box:focus-within { border-color: #38bdf8; }
        .input-box.input-error { border-color: var(--danger) !important; background: rgba(239,68,68,0.08); }

        .input-box input, .input-box select { background: transparent; border: none; color: white; padding: 0 10px; font-size: 0.85rem; width: 100%; height: 100%; outline: none; }
        
        .line-pill-container { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 8px 0; -webkit-overflow-scrolling: touch; margin-top: 2px;}
        .line-pill-container::-webkit-scrollbar { display: none; }
        .line-pill { padding: 5px 10px; border-radius: 14px; font-size: 0.7rem; font-weight: 700; color: white; cursor: pointer; opacity: 0.4; transition: all 0.2s; white-space: nowrap; border: 1px solid transparent;}
        .line-pill.active { opacity: 1; transform: scale(1.04); box-shadow: 0 2px 8px var(--pill-color); border-color: rgba(255,255,255,0.2);}

        option { color: #f8fafc; background: #1e293b; padding: 6px 0;}

        .btn-mini { height: 26px; padding: 0 8px; font-size: 0.68rem; border-radius: 5px; margin-right: 5px; background: #1e293b; color: #38bdf8; border: 1px solid #334155; font-weight: 600; flex-shrink: 0; cursor: pointer;}
        .btn-mini.gps { color: #10b981; border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.1); }
        .btn-mini.search-trigger { color: #38bdf8; border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.1); }

        .cfg-actions { display: grid; grid-template-columns: 1fr 1.4fr; gap: 8px; margin-top: 16px; }
        .btn-cancel { height: 38px; background: transparent; border: 1px solid #334155; color: #64748b; border-radius: 8px; font-size: 0.82rem; font-weight: 600;}
        .btn-save-confirm { height: 38px; background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.3); color: #38bdf8; border-radius: 8px; font-size: 0.82rem; font-weight: 600;}
        
        .btn-ai-glow {
            grid-column: span 2; height: 42px; background: #2563eb; color: white; border: none;
            border-radius: 8px; font-size: 0.88rem; font-weight: 700; letter-spacing: 0.5px;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn-ai-glow:active { transform: scale(0.99); background: #1d4ed8; }

        .timeline { display: flex; gap: 4px; justify-content: space-between; align-items: flex-start; background: #090d16; padding: 14px 2px; border-radius: 12px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.03); overflow-x: auto;}
        .step { text-align: center; flex: 1; min-width: 55px; font-size: 0.7rem; color: var(--text-sub); }
        .step span { display: block; font-size: 1.1rem; margin-bottom: 2px; }
        .step .loc-name { display: block; font-size: 0.6rem; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; color: #cbd5e1; margin-top: 2px;}
        .step b { display: block; font-size: 0.8rem; color: #38bdf8; margin-top: 2px; font-weight: 700;}
        .step b.dest-time { color: var(--clock-gold); font-size: 0.85rem; }
        
        .sub-transfer { display: block; font-size: 0.52rem; color: #f43f5e; font-style: normal; margin-top: 1px; white-space: nowrap; letter-spacing: -0.3px;}

        .arrow-box { display: flex; flex-direction: column; align-items: center; width: 16px; flex-shrink: 0; margin-top: 6px;}
        .arrow-time { font-size: 0.5rem; color: #64748b; background: #111827; padding: 1px 2px; border-radius: 2px; font-weight: bold;}
        
        .section-title { font-size: 0.98rem; font-weight: 700; color: #e2e8f0; display: flex; justify-content: space-between; align-items: center;}
        .route-sub-title { font-size: 0.82rem; color: #38bdf8; margin: 12px 0 5px 0; font-weight: 700; display: flex; align-items: center; gap: 5px;}

        .sprint-capsule { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #fbbf24; padding: 7px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; display: flex; justify-content: space-between; margin: 8px 0 4px 0; cursor: pointer;}
        .sprint-drawer { display: none; flex-direction: column; gap: 6px; margin-bottom: 8px; padding: 2px; border-left: 1.5px dashed #ef444440; }
        .sprint-drawer.open { display: flex; animation: slideDown 0.2s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

        .sprint-card-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #1e293b50; border: 1px solid #ef444430; border-radius: 10px; }

        .train { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; padding: 10px 12px; background: #090d1680; border-radius: 10px; border: 1px solid #33415540;}
        .train.next-train { background: rgba(16, 185, 129, 0.06); border-left: 3.5px solid var(--success); }
        .train-time { font-size: 1.5rem; font-weight: 800; color: var(--success); }
        .train-time.urgent { color: var(--warning); }
        .train-time.too-late { color: var(--danger); }
        .train-label { font-size: 0.84rem; color: var(--text-sub); font-weight: 500;}

        .clock-dashboard { display: flex; background: #090d16; border: 1px solid #334155; border-radius: 14px; padding: 14px; margin-top: 14px; align-items: center; }
        .clock-box { flex: 1; text-align: center; }
        .clock-label { font-size: 0.74rem; color: var(--text-sub); margin-bottom: 3px; display: block;}
        .clock-val { font-size: 1.25rem; font-weight: 800; color: var(--text-main); }
        .clock-val.target { color: var(--clock-gold); font-size: 1.38rem; }
        .divider { width: 1px; height: 32px; background: #334155; }

        .emotion-box { padding: 12px; border-radius: 12px; text-align: center; font-size: 0.88rem; font-weight: bold; margin-top: 14px; line-height: 1.4; }
        .mood-chill { background: #10b98115; color: #34d399; } .mood-run { background: #f59e0b15; color: #fbbf24; } .mood-giveup { background: #ef444415; color: #f87171; }
        #update-time { text-align: center; font-size: 0.7rem; color: #475569; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 id="main-title">🚇 實時通勤看板</h1>
        <button class="btn-config" onclick="toggleConfig()">⚙️ 修改路線</button>
    </div>

    <div id="config-panel" class="card">
        <div class="section-title" style="color:#38bdf8">🤖 AI 智能尋路設定</div>
        <div class="cfg-grid">
            
            <div class="cfg-group">
                <label>起點 <span class="req-star">*必填</span></label>
                <div class="input-box" id="wrap-start-name"><input type="text" id="cfg-start-name" placeholder="例：康城"></div>
            </div>
            <div class="cfg-group"><label>步行往站 (分)</label>
                <div class="input-box"><input type="number" id="cfg-walk1" min="1"><button type="button" class="btn-mini" onclick="smartWalk('start')">測距</button></div>
            </div>
            
            <div class="cfg-group">
                <label>終點 <span class="req-star">*必填</span></label>
                <div class="input-box" id="wrap-dest-name"><input type="text" id="cfg-dest-name" placeholder="例：赤鱲角機場"></div>
            </div>
            <div class="cfg-group"><label>出站步行 (分)</label>
                <div class="input-box"><input type="number" id="cfg-walk2" min="1"><button type="button" class="btn-mini" onclick="smartWalk('dest')">測距</button></div>
            </div>

            <div class="cfg-group cfg-full">
                <label>篩選上車站綫路</label>
                <div class="line-pill-container" id="start-line-pills"></div>
            </div>
            <div class="cfg-group cfg-full"><label>上車車站 (可手動修改/AI自動覆蓋)</label>
                <div class="input-box"><select id="cfg-start-sta"></select><button type="button" class="btn-mini search-trigger" onclick="autoLocateStationFromInput('start')">🔍 尋起點站</button></div>
            </div>

            <div class="cfg-group cfg-full">
                <label>篩選落車站綫路</label>
                <div class="line-pill-container" id="end-line-pills"></div>
            </div>
            <div class="cfg-group cfg-full"><label>落車車站 (可手動修改/AI自動覆蓋)</label>
                <div class="input-box"><select id="cfg-end-sta"></select><button type="button" class="btn-mini search-trigger" onclick="autoLocateStationFromInput('dest')">🔍 尋終點站</button></div>
            </div>

        </div>
        
        <div class="cfg-actions">
            <button class="btn-cancel" onclick="toggleConfig()">取消</button>
            <button class="btn-save-confirm" onclick="runManualSave()">💾 儲存修改</button>
            <button id="btn-save-main" class="btn-ai-glow" onclick="runAutoPathfinder()">🤖 AI 智能規劃</button>
        </div>
    </div>

    <div class="card" id="main-card">
        <div class="section-title"><span>📍 行程路標</span><span id="label-walk-speed" style="font-size:0.78rem; color:#64748b">--分步速</span></div>
        <div class="timeline" id="dynamic-timeline-box">
            <div style="text-align:center; width:100%; color:#64748b; font-size:0.8rem;">軌道地圖生成中...</div>
        </div>
    </div>

    <div class="card">
        <div class="section-title"><span id="ui-dir-label">列車動態 ⬇️</span><span style="color:var(--success); font-size:0.75rem">● 實時連線</span></div>
        <div id="train-list"><div style="text-align:center; padding: 15px; color: #64748b;">解碼中...</div></div>
        <div class="clock-dashboard">
            <div class="clock-box"><span class="clock-label">⏳ 預計總耗時</span><span class="clock-val" id="total-duration">-- 分</span></div>
            <div class="divider"></div>
            <div class="clock-box"><span class="clock-label">🏁 抵達終點</span><span class="clock-val target" id="arrive-clock">--點--分</span></div>
        </div>
        <div id="emotion-message" class="emotion-box mood-chill" style="display:none;"></div>
    </div>

    <div id="update-time">通電中...</div>

    <script>
        if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
            navigator.serviceWorker.register('./sw.js').catch(()=>{});
        }

        const MTR_GEO = { LHP:[22.2951,114.2691], TKO:[22.3088,114.2605], QUB:[22.2882,114.2105], NOP:[22.2912,114.2005], CEN:[22.2818,114.1582], HOK:[22.2848,114.1582], TUC:[22.2895,113.9415], AIR:[22.2974,113.9351], LOF:[22.3385,114.1870], WTS:[22.3420,114.1930], SKM:[22.3320,114.1680], PRE:[22.3245,114.1682], MOK:[22.3192,114.1694], YMT:[22.3130,114.1706], JOR:[22.3048,114.1718], TST:[22.2980,114.1722], ADM:[22.2798,114.1648], SHW:[22.2868,114.1520], SYP:[22.2865,114.1428], HKU:[22.2842,114.1338], KET:[22.2812,114.1280], WAC:[22.2778,114.1730], CAB:[22.2802,114.1852], TIN:[22.2825,114.1918], FOH:[22.2888,114.1940], TAK:[22.2848,114.2168], SWH:[22.2820,114.2222], SKW:[22.2788,114.2288], HFC:[22.2768,114.2388], CHW:[22.2648,114.2368], KOT:[22.3370,114.1760], CHH:[22.3348,114.2088], DIH:[22.3402,114.2018], KOB:[22.3238,114.2140], NTK:[22.3158,114.2188], KWT:[22.3122,114.2251], LAT:[22.3072,114.2328], YAT:[22.2982,114.2380], TIK:[22.3070,114.2525], HAH:[22.3158,114.2648], POA:[22.3230,114.2580], HUH:[22.3032,114.1818], MKK:[22.3218,114.1725], TAW:[22.3730,114.1788], SHT:[22.3832,114.1878], FOT:[22.3962,114.1980], UNI:[22.4138,114.2105], TAP:[22.4442,114.1688], TWO:[22.4508,114.1618], FAN:[22.4925,114.1388], SHS:[22.5015,114.1280], LOW:[22.5288,114.1130], EXC:[22.2828,114.1748], HOM:[22.3092,114.1825], WHA:[22.3042,114.1895], OLY:[22.3180,114.1600], KOW:[22.3048,114.1612], NAC:[22.3268,114.1538], LAK:[22.3482,114.1265], TSY:[22.3588,114.1070], SUN:[22.3218,114.0305], SSP:[22.3308,114.1622], CSW:[22.3358,114.1558], LCK:[22.3372,114.1488], MEF:[22.3375,114.1402], KWF:[22.3568,114.1280], TWH:[22.3638,114.1315], TSW:[22.3738,114.1172], TUM:[22.3952,113.9738], SIH:[22.4118,113.9782], TIS:[22.4475,114.0028], LOP:[22.4478,114.0238], YUL:[22.4468,114.0348], KSR:[22.4338,114.0648], TWW:[22.3688,114.1112], AUS:[22.3048,114.1668], TSY:[22.3588,114.1070] };

        const MTR_DB = {
            'TKL': { name: '將軍澳綫', color: '#8D9020', order: ['LHP','TKO','TIK','YAT','QUB','NOP'], times: { LHP:0, TKO:5, TIK:8, YAT:11, QUB:14, NOP:17 }, names: { LHP:'康城', TKO:'將軍澳', TIK:'調景嶺', YAT:'油塘', QUB:'鰂魚涌', NOP:'北角' }},
            'ISL': { name: '港島綫', color: '#007FFF', order: ['NOP','QUB','TAK','SWH','SKW','HFC','CHW','FOH','TIN','CAB','WAC','ADM','CEN','SHW','SYP','HKU','KET'], times: { NOP:0, QUB:2, TAK:4, SWH:6, SKW:8, HFC:11, CHW:14, FOH:-2, TIN:-4, CAB:-6, WAC:-8, ADM:-10, CEN:-12, SHW:-14, SYP:-16, HKU:-18, KET:-20 }, names: { NOP:'北角', QUB:'鰂魚涌', TAK:'太古', SWH:'西灣河', SKW:'筲箕灣', HFC:'杏花邨', CHW:'柴灣', FOH:'炮台山', TIN:'天后', CAB:'銅鑼灣', WAC:'灣仔', ADM:'金鐘', CEN:'中環', SHW:'上環', SYP:'西營盤', HKU:'香港大學', KET:'堅尼地城' }},
            'TWL': { name: '荃灣綫', color: '#E2231A', order: ['CEN','ADM','TST','JOR','YMT','MOK','PRE','SSP','CSW','LCK','MEF','LAK','KWF','TWH','TSW'], times: { CEN:0, ADM:3, TST:6, JOR:8, YMT:10, MOK:12, PRE:14, SSP:16, CSW:18, LCK:20, MEF:22, LAK:26, KWF:29, TWH:31, TSW:34 }, names: { CEN:'中環', ADM:'金鐘', TST:'尖沙咀', JOR:'佐敦', YMT:'油麻地', MOK:'旺角', PRE:'太子', SSP:'深水埗', CSW:'長沙灣', LCK:'荔枝角', MEF:'美孚', LAK:'荔景', KWF:'葵芳', TWH:'葵興', TSW:'荃灣' }},
            'TCL': { name: '東涌綫', color: '#F38B00', order: ['HOK','KOW','OLY','NAC','LAK','TSY','SUN','TUC'], times: { HOK:0, KOW:3, OLY:6, NAC:9, LAK:13, TSY:16, SUN:23, TUC:29 }, names: { HOK:'香港', KOW:'九龍', OLY:'奧運', NAC:'南昌', LAK:'荔景', TSY:'青衣', SUN:'欣澳', TUC:'東涌' }},
            'AEL': { name: '機場快綫', color: '#1A949C', order: ['HOK','KOW','TSY','AIR'], times: { HOK:0, KOW:3, TSY:12, AIR:24 }, names: { HOK:'香港', KOW:'九龍', TSY:'青衣', AIR:'赤鱲角機場' }},
            'KTL': { name: '觀塘綫', color: '#00A84D', order: ['WHA','HOM','YMT','MOK','PRE','SKM','KOT','LOF','WTS','DIH','CHH','KOB','NTK','KWT','LAT','YAT','TIK'], times: { WHA:0, HOM:2, YMT:4, MOK:6, PRE:8, SKM:10, KOT:13, LOF:15, WTS:17, DIH:19, CHH:21, KOB:23, NTK:25, KWT:27, LAT:30, YAT:33, TIK:37 }, names: { WHA:'黃埔', HOM:'何文田', YMT:'油麻地', MOK:'旺角', PRE:'太子', SKM:'石礤尾', KOT:'九龍塘', LOF:'樂富', WTS:'黃大仙', DIH:'鑽石山', CHH:'彩虹', KOB:'九龍灣', NTK:'牛頭角', KWT:'觀塘', LAT:'藍田', YAT:'油塘', TIK:'調景嶺' }}
        };

        const PREF_HUBS = ['MOK','ADM','CEN','TST','KOT','HUH','TAW','DIH','PRE','YMT','NOP','QUB','YAT','TIK','MEF','NAC','LAK','HOM','HOK','KOW','TSY'];

        const STA_INDEX = {};
        for (let l in MTR_DB) {
            MTR_DB[l].order.forEach(c => {
                if (!STA_INDEX[c]) STA_INDEX[c] = { name: MTR_DB[l].names[c], lines: [] };
                if (!STA_INDEX[c].lines.includes(l)) STA_INDEX[c].lines.push(l);
            });
        }

        const fmtT = d => `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        const fmtC = d => { let h = d.getHours(), m = d.getMinutes().toString().padStart(2, '0'); return `${h < 6 ? "凌晨" : h < 12 ? "上午" : h < 18 ? "下午" : "晚上"} ${h % 12 || 12}點${m}分`; };

        function getClosestMTRCode(lat, lon) {
            let minD = 9999, best = 'MOK';
            for (let c in MTR_GEO) {
                let d = Math.hypot(lat - MTR_GEO[c][0], lon - MTR_GEO[c][1]);
                if (d < minD) { minD = d; best = c; }
            }
            return best;
        }

        function getMazePenalty(code) {
            if (['HKU','SYP','QUB','HOM','LAT','YAT','DIH','EXC','ADM','CEN','TST','HOK','AIR'].includes(code)) return 4.5;
            return 2.0;
        }

        async function geocodeAddress(kw) {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(kw+",香港")}&format=json&limit=1`);
                const d = await r.json();
                if(d.length > 0) return { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon) };
            } catch(e) {}
            return null;
        }

        let activeStartLine = 'TKL';
        let activeEndLine = 'AEL';

        function renderStationSelect(type, targetLine) {
            const select = document.getElementById(type === 'start' ? 'cfg-start-sta' : 'cfg-end-sta');
            let html = '';
            if (MTR_DB[targetLine]) {
                MTR_DB[targetLine].order.forEach(code => {
                    html += `<option value="${code}">${MTR_DB[targetLine].names[code]}站</option>`;
                });
            }
            select.innerHTML = html;
        }

        function setupLinePills() {
            const startBox = document.getElementById('start-line-pills');
            const endBox = document.getElementById('end-line-pills');
            let startHtml = '', endHtml = '';

            for (let lineKey in MTR_DB) {
                startHtml += `<div class="line-pill ${lineKey===activeStartLine?'active':''}" id="pill-start-${lineKey}" style="background:${MTR_DB[lineKey].color}; --pill-color:${MTR_DB[lineKey].color}" onclick="selectLinePill('start', '${lineKey}')">${MTR_DB[lineKey].name}</div>`;
                endHtml += `<div class="line-pill ${lineKey===activeEndLine?'active':''}" id="pill-end-${lineKey}" style="background:${MTR_DB[lineKey].color}; --pill-color:${MTR_DB[lineKey].color}" onclick="selectLinePill('end', '${lineKey}')">${MTR_DB[lineKey].name}</div>`;
            }
            startBox.innerHTML = startHtml; endBox.innerHTML = endHtml;
            renderStationSelect('start', activeStartLine);
            renderStationSelect('end', activeEndLine);
        }

        function selectLinePill(type, lineKey) {
            if (type === 'start') {
                document.getElementById(`pill-start-${activeStartLine}`).classList.remove('active');
                activeStartLine = lineKey;
                document.getElementById(`pill-start-${activeStartLine}`).classList.add('active');
                renderStationSelect('start', lineKey);
            } else {
                document.getElementById(`pill-end-${activeEndLine}`).classList.remove('active');
                activeEndLine = lineKey;
                document.getElementById(`pill-end-${activeEndLine}`).classList.add('active');
                renderStationSelect('end', lineKey);
            }
        }

        async function autoLocateStationFromInput(type) {
            const inputId = type === 'start' ? 'cfg-start-name' : 'cfg-dest-name';
            const queryName = document.getElementById(inputId).value.trim();
            if (!queryName) return alert("🚨 請先輸入地名門牌！");

            let targetCode = 'MOK';
            if (queryName.includes('康城')) targetCode = 'LHP';
            else if (queryName.includes('機場')) targetCode = 'AIR';
            else {
                const coord = await geocodeAddress(queryName);
                if (coord) targetCode = getClosestMTRCode(coord.lat, coord.lon);
            }

            let belongLine = STA_INDEX[targetCode].lines[0];
            selectLinePill(type, belongLine);
            document.getElementById(type === 'start' ? 'cfg-start-sta' : 'cfg-end-sta').value = targetCode;
            alert(`🎯 已為你鎖定最近車站：【${STA_INDEX[targetCode].name}站】`);
        }

        function syncFormValues() {
            document.getElementById('cfg-start-name').value = curCfg.startName;
            document.getElementById('cfg-walk1').value = curCfg.walk1;
            document.getElementById('cfg-dest-name').value = curCfg.destName;
            document.getElementById('cfg-walk2').value = curCfg.walk2;
            
            if (STA_INDEX[curCfg.sCode]) {
                selectLinePill('start', STA_INDEX[curCfg.sCode].lines[0]);
                document.getElementById('cfg-start-sta').value = curCfg.sCode;
            }
            if (STA_INDEX[curCfg.eCode]) {
                selectLinePill('end', STA_INDEX[curCfg.eCode].lines[0]);
                document.getElementById('cfg-end-sta').value = curCfg.eCode;
            }
        }

        function toggleConfig() { 
            const p = document.getElementById('config-panel');
            if (p.style.display !== 'block') {
                syncFormValues(); p.style.display = 'block';
            } else { p.style.display = 'none'; }
        }

        function validateForm() {
            let sName = document.getElementById('cfg-start-name').value.trim();
            let dName = document.getElementById('cfg-dest-name').value.trim();
            let hasError = false;
            document.getElementById('wrap-start-name').classList.remove('input-error');
            document.getElementById('wrap-dest-name').classList.remove('input-error');
            if (!sName) { document.getElementById('wrap-start-name').classList.add('input-error'); hasError = true; }
            if (!dName) { document.getElementById('wrap-dest-name').classList.add('input-error'); hasError = true; }
            if (hasError) { alert("🚨 師兄慢著！起點同終點係必填㗎，填好先可以規劃路線！"); return false; }
            return true;
        }

        async function runAutoPathfinder() {
            if (!validateForm()) return;
            const btn = document.getElementById('btn-save-main');
            const origText = btn.innerText; btn.innerText = "🧠 AI 運算中..."; btn.disabled = true;

            let sName = document.getElementById('cfg-start-name').value.trim();
            let dName = document.getElementById('cfg-dest-name').value.trim();
            let sCode = document.getElementById('cfg-start-sta').value;
            let eCode = document.getElementById('cfg-end-sta').value;
            let w1 = parseInt(document.getElementById('cfg-walk1').value) || 4;
            let w2 = parseInt(document.getElementById('cfg-walk2').value) || 3;

            try {
                if (sName.toUpperCase() === 'APM') { sCode = 'KWT'; w1 = 4; } 
                else {
                    const c1 = await geocodeAddress(sName);
                    if (c1) {
                        sCode = getClosestMTRCode(c1.lat, c1.lon);
                        let r = await fetch(`https://router.project-osrm.org/route/v1/foot/${c1.lon},${c1.lat};${MTR_GEO[sCode][1]},${MTR_GEO[sCode][0]}`);
                        let rd = await r.json();
                        w1 = Math.max(1, Math.round((rd.routes[0].duration / 60) + getMazePenalty(sCode)));
                    }
                }
                if (dName.toUpperCase() === 'K11') { eCode = 'TST'; w2 = 3; } 
                else {
                    const c2 = await geocodeAddress(dName);
                    if (c2) {
                        eCode = getClosestMTRCode(c2.lat, c2.lon);
                        let r2 = await fetch(`https://router.project-osrm.org/route/v1/foot/${c2.lon},${c2.lat};${MTR_GEO[eCode][1]},${MTR_GEO[eCode][0]}`);
                        let rd2 = await r2.json();
                        w2 = Math.max(1, Math.round((rd2.routes[0].duration / 60) + getMazePenalty(eCode)));
                    }
                }

                curCfg = { startName: sName, walk1: w1, sCode: sCode, eCode: eCode, walk2: w2, destName: dName };
                localStorage.setItem('my_commute_full_hk_v16', JSON.stringify(curCfg));
                syncFormValues(); document.getElementById('config-panel').style.display = 'none';
                applyUI(); fetchMTR();
            } catch(e) { alert("運算小偏差：" + e.message); }
            btn.innerText = origText; btn.disabled = false;
        }

        function runManualSave() {
            if (!validateForm()) return;
            let sName = document.getElementById('cfg-start-name').value.trim();
            let dName = document.getElementById('cfg-dest-name').value.trim();
            let sCode = document.getElementById('cfg-start-sta').value;
            let eCode = document.getElementById('cfg-end-sta').value;
            let w1 = parseInt(document.getElementById('cfg-walk1').value) || 4;
            let w2 = parseInt(document.getElementById('cfg-walk2').value) || 3;

            curCfg = { startName: sName, walk1: w1, sCode: sCode, eCode: eCode, walk2: w2, destName: dName };
            localStorage.setItem('my_commute_full_hk_v16', JSON.stringify(curCfg));
            document.getElementById('config-panel').style.display = 'none';
            applyUI(); fetchMTR();
        }

        async function smartWalk(type) {
            const sCode = type === 'start' ? document.getElementById('cfg-start-sta').value : document.getElementById('cfg-end-sta').value;
            const pName = type === 'start' ? document.getElementById('cfg-start-name').value : document.getElementById('cfg-dest-name').value;
            const targetId = type === 'start' ? 'cfg-walk1' : 'cfg-walk2';
            if (!pName) return alert('請先輸入起點或終點！');
            if(type === 'start' && pName.toUpperCase() === 'APM') { document.getElementById(targetId).value = 4; return; }
            if(type === 'dest' && pName.toUpperCase() === 'K11') { document.getElementById(targetId).value = 3; return; }
            const c = await geocodeAddress(pName);
            if(c) {
                let r = await fetch(`https://router.project-osrm.org/route/v1/foot/${c.lon},${c.lat};${MTR_GEO[sCode][1]},${MTR_GEO[sCode][0]}`);
                let rd = await r.json();
                document.getElementById(targetId).value = Math.max(1, Math.round((rd.routes[0].duration/60) + getMazePenalty(sCode)));
            }
        }

        function calculateAutoRoute(sCode, eCode) {
            if (sCode === eCode) return { legs: [] };
            const checkCenHok = (a, b) => (a === 'CEN' && b === 'HOK') || (a === 'HOK' && b === 'CEN');

            let queue = [ { current: sCode, path: [], visitedLines: [] } ];
            let visitedStations = new Set([sCode]);

            while (queue.length > 0) {
                let { current, path, visitedLines } = queue.shift();
                let currentLines = STA_INDEX[current].lines;
                let endLines = STA_INDEX[eCode].lines;
                let finalDirectLine = currentLines.find(l => endLines.includes(l));
                
                if (finalDirectLine || checkCenHok(current, eCode)) {
                    let lastLine = finalDirectLine || (current === 'CEN' ? 'AEL' : 'ISL');
                    let rideTime = checkCenHok(current, eCode) ? 4 : Math.abs(MTR_DB[lastLine].times[current] - MTR_DB[lastLine].times[eCode]);
                    let finalPath = [...path, { line: lastLine, from: current, to: eCode, ride: rideTime || 2 }];
                    return { legs: finalPath };
                }

                currentLines.forEach(line => {
                    if (visitedLines.includes(line)) return;
                    MTR_DB[line].order.forEach(nextStation => {
                        if (nextStation === current || visitedStations.has(nextStation)) return;
                        if (STA_INDEX[nextStation].lines.length > 1 || nextStation === 'CEN' || nextStation === 'HOK') {
                            let t = Math.abs(MTR_DB[line].times[current] - MTR_DB[line].times[nextStation]);
                            let nextPath = [...path, { line: line, from: current, to: nextStation, ride: t || 2 }];
                            visitedStations.add(nextStation);
                            queue.push({ current: nextStation, path: nextPath, visitedLines: [...visitedLines, line] });
                            if (nextStation === 'CEN' && !visitedStations.has('HOK')) {
                                visitedStations.add('HOK');
                                queue.push({ current: 'HOK', path: [...nextPath, { line: 'WALK', from: 'CEN', to: 'HOK', ride: 4 }], visitedLines: visitedLines });
                            }
                            if (nextStation === 'HOK' && !visitedStations.has('CEN')) {
                                visitedStations.add('CEN');
                                queue.push({ current: 'CEN', path: [...nextPath, { line: 'WALK', from: 'HOK', to: 'CEN', ride: 4 }], visitedLines: visitedLines });
                            }
                        }
                    });
                });
            }
            return { legs: [{ line: STA_INDEX[sCode].lines[0], from: sCode, to: eCode, ride: 25 }] };
        }

        const DEF_CFG = { startName: '康城', walk1: 8, sCode: 'LHP', eCode: 'AIR', walk2: 3, destName: '赤鱲角機場' };
        let curCfg = JSON.parse(localStorage.getItem('my_commute_full_hk_v16')) || DEF_CFG;
        let activeRoute = null; let isSprintOpen = false;

        function toggleSprintDrawer() {
            isSprintOpen = !isSprintOpen;
            document.getElementById('sprint-drawer-box')?.classList.toggle('open', isSprintOpen);
            document.getElementById('sprint-arrow-icon').innerText = isSprintOpen ? '▲' : '▼';
        }

        document.addEventListener("DOMContentLoaded", function() {
            setupLinePills(); syncFormValues(); applyUI(); fetchMTR(); setInterval(fetchMTR, 10000);
        });

        function applyUI() {
            activeRoute = calculateAutoRoute(curCfg.sCode, curCfg.eCode);
            document.getElementById('label-walk-speed').innerText = `${curCfg.walk1}分鐘步速`;
            if (activeRoute.legs.length > 0) {
                let firstLine = activeRoute.legs[0].line;
                document.getElementById('main-card').style.borderTop = `3.5px solid ${MTR_DB[firstLine]?.color || '#38bdf8'}`;
            }
        }

        /* 🎯 升級大腦：改用 Promise.all 併發獲取整條線路中「所有轉乘車次」的實時 API 數據 */
        async function fetchMTR() {
            if (!activeRoute || activeRoute.legs.length === 0) return;
            const currentW = parseInt(document.getElementById('cfg-walk1').value) || curCfg.walk1;

            const fetchPromises = activeRoute.legs.map(async (leg) => {
                if (leg.line === 'WALK') return { leg, schedule: [] };
                const dir = MTR_DB[leg.line].order.indexOf(leg.from) < MTR_DB[leg.line].order.indexOf(leg.to) ? 'UP' : 'DOWN';
                const url = `https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${leg.line}&sta=${leg.from}`;
                try {
                    const res = await fetch(url);
                    const d = await res.json();
                    return { leg, schedule: d.data[`${leg.line}-${leg.from}`][dir] || [] };
                } catch (e) {
                    return { leg, schedule: [] };
                }
            });

            try {
                const results = await Promise.all(fetchPromises);
                renderDashboard(results, currentW);
            } catch (err) {}
        }

        /* 🎯 完美渲染：動態讀取起點/終點名，並且完整遍歷每一程地鐵的實時到站時間 */
        function renderDashboard(results, dynamicW) {
            const listHtml = document.getElementById('train-list'), eBox = document.getElementById('emotion-message'), now = new Date();
            let html = '';

            results.forEach((res, legIdx) => {
                const { leg, schedule } = res;
                if (leg.line === 'WALK') return; // 略過香港站/中環站這種步行通道

                let lineObj = MTR_DB[leg.line];
                // 為每一程顯示專屬的分段標題
                html += `<div class="route-sub-title" style="color:${lineObj?.color || '#38bdf8'}; margin-top: ${legIdx > 0 ? '16px' : '4px'};">
                            🚇 第 ${legIdx + 1} 程：${lineObj?.name}（${STA_INDEX[leg.from].name}站出發）
                         </div>`;

                // 🌟 第一程：維持核心邏輯（狂奔區 + 正常步速配對），因為出門這步最關鍵
                if (legIdx === 0) {
                    const W = dynamicW;
                    const sprintTrains = schedule.filter(t => parseInt(t.ttnt) < W && !isNaN(parseInt(t.ttnt))), walkTrains = schedule.filter(t => parseInt(t.ttnt) >= W);
                    let showWalk = walkTrains.slice(0, 2); let isMid = !walkTrains.length && !sprintTrains.length;

                    if (sprintTrains.length > 0) {
                        html += `<div class="sprint-capsule" onclick="toggleSprintDrawer()"><span>💡 已收起 ${sprintTrains.length} 班狂奔列車</span><b id="sprint-arrow-icon">${isSprintOpen ? '▲' : '▼'}</b></div><div id="sprint-drawer-box" class="sprint-drawer ${isSprintOpen ? 'open' : ''}">`;
                        sprintTrains.forEach(t => {
                            let sm = parseInt(t.ttnt);
                            html += `<div class="sprint-card-item"><div><span style="color:#f87171; font-size:0.85rem; font-weight:700;">🏃‍♂️ 極速狂奔（${sm}分到站）</span></div><span style="font-size:1.4rem; font-weight:800; color:#ef4444;">${sm}分</span></div>`;
                        });
                        html += `</div>`;
                    }

                    if (showWalk.length === 0 && !isMid) {
                        html += `<div class="train" style="border: 1px dashed rgba(245, 158, 11, 0.4); background: rgba(245, 158, 11, 0.03);">
                                    <span class="train-label" style="color:var(--warning); font-size:0.82rem; font-weight:600;">🐢 正常步速已無趕得切嘅車次</span>
                                    <span class="train-time urgent" style="font-size:0.88rem; font-weight:700; color:#fbbf24;">請點開上方狂奔區 🏃‍♂️</span>
                                 </div>`;
                    }

                    showWalk.forEach((t, i) => {
                        let m = parseInt(t.ttnt);
                        html += `<div class="${i===0 ?'train next-train':'train'}"><span class="train-label">${i===0?'🚶‍♂️ 正常步速（首選）':'🛡️ 次班備用'}</span><span class="train-time ${(m===W||m===W+1)?'urgent':''}">${isNaN(m)?"抵達中":m+" 分鐘"}</span></div>`;
                    });

                    // 依據第一程動態演算出門情緒小板塊
                    eBox.style.display = 'block';
                    if (showWalk.length === 0) {
                        let latestSprintMins = sprintTrains.length > 0 ? parseInt(sprintTrains[sprintTrains.length - 1].ttnt) : 0;
                        if (latestSprintMins < W - 2) {
                            eBox.className = 'emotion-box mood-chill';
                            eBox.innerHTML = `🐢 慢慢嚟啦！最遲班車得 ${latestSprintMins} 分鐘，行要 ${W} 分鐘，點跑都衝唔到！正常行去月台坐下一班啦。`;
                        } else {
                            eBox.className = 'emotion-box mood-run';
                            eBox.innerHTML = `⚡ <b>搏盡模式！</b> 狂奔區最遲班次喺 ${latestSprintMins} 分鐘後。正常行（${W}分）會送車尾，但如果你<b>依家即刻跑</b>減 2 分鐘，有望衝到！`;
                        }
                    } else {
                        eBox.className = 'emotion-box mood-chill';
                        eBox.innerHTML = `😎 時間非常充裕！首選班次喺 ${parseInt(showWalk[0]?.ttnt || 0)} 分鐘後到站，慢慢行即可。`;
                    }
                } else {
                    // 🌟 後續轉乘程：清晰排列未來兩班車的動態，讓轉線心理有底
                    if (schedule.length === 0) {
                        html += `<div style="text-align:center; padding: 10px; color: #64748b; font-size:0.8rem;">暫無實時班次數據</div>`;
                    } else {
                        schedule.slice(0, 2).forEach((t, i) => {
                            let m = parseInt(t.ttnt);
                            html += `<div class="train">
                                        <span class="train-label">${i===0?'⏳ 緊接下一班':'⏳ 隨後班次'}</span>
                                        <span class="train-time" style="color:var(--text-main); font-size:1.2rem;">${isNaN(m) ? "抵達中" : m + " 分鐘"}</span>
                                     </div>`;
                        });
                    }
                }
            });

            listHtml.innerHTML = html;

            // 倒推和同步下方行程時間軸與總耗時
            const firstLegRes = results.find(r => r.leg.line !== 'WALK');
            let firstTrainMins = dynamicW;
            if (firstLegRes && firstLegRes.schedule.length > 0) {
                const walkTrains = firstLegRes.schedule.filter(t => parseInt(t.ttnt) >= dynamicW);
                firstTrainMins = walkTrains.length > 0 ? (parseInt(walkTrains[0].ttnt) || 0) : dynamicW;
            }

            let tCurrent = new Date(now.getTime() + firstTrainMins * 60000);
            
            // 🎯 修改點：動態帶入自訂地名 curCfg.startName
            let tlHtml = `<div class="step"><span>🏡</span><div class="loc-name">${curCfg.startName}</div><b>${fmtT(now)}</b></div>
                          <div class="arrow-box"><span class="arrow-time">+${curCfg.walk1}分</span>➔</div>`;

            let legs = activeRoute.legs;
            legs.forEach((leg, index) => {
                let lineObj = MTR_DB[leg.line];
                let lineName = lineObj ? lineObj.name.replace('綫','') : '步行';
                tlHtml += `<div class="step"><span>🚇</span><div class="loc-name">${STA_INDEX[leg.from].name}</div><b>${fmtT(tCurrent)}</b></div>
                          <div class="arrow-box"><span class="arrow-time">+${leg.ride}分</span>➔</div>`;
                tCurrent = new Date(tCurrent.getTime() + leg.ride * 60000);
                if (index < legs.length - 1) {
                    tlHtml += `<div class="step"><span>🔄</span><div class="loc-name" style="color:#38bdf8">${STA_INDEX[leg.to].name}</div><b>${fmtT(tCurrent)}</b><em class="sub-transfer">轉${lineName}</em></div>
                              <div class="arrow-box"><span class="arrow-time">+3分</span>➔</div>`;
                    tCurrent = new Date(tCurrent.getTime() + 3 * 60000);
                }
            });

            let tDest = new Date(tCurrent.getTime() + curCfg.walk2 * 60000);
            // 🎯 修改點：動態帶入自訂目的地名 curCfg.destName
            tlHtml += `<div class="step"><span>🏁</span><div class="loc-name">${curCfg.destName}</div><b class="dest-time">${fmtT(tDest)}</b></div>`;
            
            document.getElementById('dynamic-timeline-box').innerHTML = tlHtml;
            document.getElementById('total-duration').innerText = `共 ${Math.round((tDest - now)/60000)} 分鐘`; 
            document.getElementById('arrive-clock').innerText = fmtC(tDest);
        }
    </script>
</body>
